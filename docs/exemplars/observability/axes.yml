taxonomy-version: 1
axes:
  metric-model:
    values: [counters-only, counters-plus-gauges, prometheus-four-types, opentelemetry-full]
    description: The metric type vocabulary. Counters-only = monotonic counts; counters-plus-gauges = adds current-value measurements; prometheus-four-types = counter, gauge, histogram, summary; opentelemetry-full = adds spans, traces, and structured events.
  cardinality:
    values: [low-fixed-labels, bounded-labels, high-cardinality-traces, unlimited]
    description: How label dimensions are controlled. Low-fixed-labels = service-level dimensions only (env, region); bounded-labels = enumerable label sets (status_code, method); high-cardinality-traces = per-request labels offloaded to traces, not metrics; unlimited = labels include user-id or other unbounded values (expensive, generally an anti-pattern).
  collection:
    values: [push, pull-scrape, agent-relay, sidecar-export]
    description: How metrics reach the collector. Push = service POSTs to a gateway; pull-scrape = collector GETs from a service-exposed endpoint; agent-relay = local daemon batches and forwards; sidecar-export = co-located process owned by the platform reads from the service.
